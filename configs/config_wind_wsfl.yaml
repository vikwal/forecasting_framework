params:
  turbines: [
             'Enercon E-70 E4 2.300',
             'Enercon E-82 E2 2.000',
             'Enercon E-115 2.500',
             'Vestas V90',
             'Vestas V112-3.45',
             'Vestas V80-1.8'
            ]
  known_features: [
    'wind_speed_h10', 'wind_speed_h38'
                   ]
  observed_features: [
                      #'wind_speed_next'
                      ]
  static_features: [
    'altitude',
    'latitude',
    'longitude',
    # 'station_rel_lat',
    # 'station_rel_lon'
  ]
  aggregate_nwp_layers: 'weighted_mean'
  get_density: True
  turbines_per_park: 1
  random_seed: 42
  next_n_grid_points: 1
  next_n_stations: 0
  aggregate_grid_points: False
  get_next_grid_points_method: 'geodesic_next'
  extrapolate: null

model:
  num_workers: 0
  epochs: 1
  output_dim: 48
  lookback: 48
  horizon: 48
  step_size: 48
  batch_size: 64
  lr: 0.0001
  optimizer: 'adam'
  loss: 'mse'
  metrics: ['mae', 'rmse', 'r^2']
  fnn:
    units: 128
    n_layers: 2
  cnn:
    filters: 40
    kernel_size: 3
    n_cnn_layers: 5
    increase_filters: False
  rnn:
    n_rnn_layers: 2
    units: 64
    dropout: 0.01
  attention_heads: 32
  stemgnn:
    units: 32
    stack_cnt: 2
    multi_layer: 5
    dropout: 0.5
  tft:
    n_heads: 8
    hidden_dim: 40
    dropout: 0.1
    rnn_type: 'lstm'
    n_lstm_layers: 1
    static_embedding_dim: 128
    quantiles: [0.5]
    clipnorm: 7
  chronos:
    repo_id: 'amazon/chronos-2'
    device_map: 'cuda'
    fine_tune_mode: 'lora'
    lora_config: null
    num_steps: null
    quantile_levels: [0.5]
    cross_learning: false
    output_dir: 'models/'
    finetuned_ckpt_name: 'finetuned-ckpt'
  callbacks: False
  shuffle: True
  force_retrain: True
  early_stopping:
    enabled: True
    patience: 10
    min_delta: 0.0001
    monitor: 'val_rmse'
    mode: 'min'
    restore_best_weights: True
  parallelize: False
  lookup_hpo: True
  verbose: 1

hpo:
  studies_path: '/mnt/nvme1/optuna_studies/wind10m.db'
  objectives:
    - metric: 'val_rmse'
      direction: 'minimize'
  trials: 1000
  kfolds: 4
  min_train_date: '2024-04-30'
  val_split: 1
  pruning:
    use_median_pruner: True
    n_startup_trials: 10
    n_warmup_steps: 2
    interval_steps: 1
    disable_pruning: False
  batch_size: [32, 1024]
  epochs: [1, 150]
  n_layers: [1, 4]
  n_cnn_layers: [1, 10]
  n_rnn_layers: [1, 7]
  learning_rate: [0.0001, 0.01]
  attention_heads: [1,64]
  fnn:
    units: [32, 256]
  cnn:
    filters: [16, 128]
    kernel_size: [2, 5]
    increase_filters: False
  rnn:
    units: [16, 100]
    dropout: [0.0, 0.8]
  tft:
    n_heads: [1, 8]
    hidden_dim: [16, 256]
    dropout: [0.01, 0.8]
    n_lstm_layers: [1, 5]
    static_embedding_dim: [8, 128]
    #quantiles: [0.5]
    clipnorm: [0, 10.0]
  fl:
    strategy: 'fedavg'
    personalize: False
    n_rounds: [1,20]
    server_lr: [0.0001, 0.1]
    beta_1: [0,1]
    beta_2: [0,1]
    tau: [0.0001, 0.1]

eval:
  results_path: 'results'
  eval_on_all_test_data: True
  retrain_interval: 0
  t_0: 12
  synth_wind:
    h1: 10
    p_s_model: 'huang'
    v2_method: 'alphaI'
    karman: 0.4
    temp_gradient: 0.00649
    interpol_method: 'polynomial'
    polynom_grad: 3
    noise: 0.0
    annual_degradation: 0.0063
    apply_ageing: True
    hourly_resolution: True
    random_seed: 42
    turbine_dir: "/mnt/nas/synthetic/wind/power_curves"
    turbine_power: 'turbine_power.csv'
    turbine_specs: "turbine_specs.csv"
    turbine_cp: "turbine_cp.csv"
    turbine_names: "turbine_names.csv"
    wind_ages: '/mnt/nas/synthetic/wind/wind_ages.npy'
  synth_pv:
