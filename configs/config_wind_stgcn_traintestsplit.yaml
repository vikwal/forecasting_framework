             'Enercon E-70 E4 2.300',
             'Enercon E-82 E2 2.000',
             'Enercon E-115 2.500',
             'Vestas V90',
             'Vestas V112-3.45',
             'Vestas V80-1.8'
            ]
  known_features: [
    'wind_speed_h10', 'wind_speed_h38', 'ecmwf_wind_speed_h10',
                   ]
  observed_features: [
                      #'power'
                      #'wind_speed' #, 'wind_direction_next'
                      ] # lag features
  static_features: [
    # 'park_age',
    # 'cut_in',
    # 'cut_out',
    # 'rated_wind_speed',
    # 'hub_height',
    # 'rotor_diameter',
    'altitude',
    'latitude',
    'longitude',
    # 'station_rel_lat',
    # 'station_rel_lon'
  ]
  aggregate_nwp_layers: 'weighted_mean' # options: 'not', 'pivot', 'weighted_mean', 'mean'
  get_density: True
  turbines_per_park: 1
  random_seed: 42
  next_n_grid_ecmwf: 1
  next_n_grid_points: 1 # Number of nearest grid points to include
  next_n_stations: 0
  nwp_models: ['icon-d2', 'ecmwf']
  ecmwf_features: ['u_wind10m', 'v_wind10m']
  aggregate_grid_points: False
  get_next_grid_points_method: 'geodesic_next' # options: 'geodesic_next', 'relative_position'
  extrapolate: null #'wind_speed_h10' # null # Spaltenname für Power-Law-Extrapolation auf Nabenhöhe (z.B. 'wind_speed_h10'), nur wenn target_col='power'

model:
  num_workers: 0 # 'auto' for all physical cores
  epochs: 100
  output_dim: 48
  lookback: 48
  horizon: 48
  step_size: 48
  batch_size: 64
  lr: 0.0001
  optimizer: 'adam'
  loss: 'mse'
  metrics: ['mae', 'rmse', 'r^2']
  fnn:
    units: 128
    n_layers: 2
  cnn:
    filters: 40
    kernel_size: 3
    n_cnn_layers: 5
    increase_filters: False
  rnn:
    n_rnn_layers: 2
    units: 64
    dropout: 0.01
  attention_heads: 32 # if attention is used in hybrid models
  stemgnn:
    units: 32
    stack_cnt: 2
    multi_layer: 5
    dropout: 0.5
  tft:
    n_heads: 8
    hidden_dim: 40
    dropout: 0.1
    rnn_type: 'lstm'
    n_lstm_layers: 1  # Same for encoder and decoder
    static_embedding_dim: 128  # Separate dimension for static feature embeddings (null = use hidden_dim)
    quantiles: [0.5]  # Set to [0.5] for deterministic point forecast, or specify multiple quantiles for probabilistic forecasting
    clipnorm: 7
  chronos:
    repo_id: 'amazon/chronos-2'
    device_map: 'cuda'
    fine_tune_mode: 'lora'   # 'full' or 'lora'
    lora_config: null        # only relevant if fine_tune_mode: 'lora'
    num_steps: null          # null → falls back to model.epochs
    quantile_levels: [0.5]   # median = deterministic point forecast
    cross_learning: false
    output_dir: 'models/'
    finetuned_ckpt_name: 'finetuned-ckpt'
    # prediction_length → model.horizon
    # batch_size        → model.batch_size
    # context_length    → model.lookback
    # learning_rate     → model.lr
  callbacks: False
  shuffle: True
  force_retrain: True
  early_stopping:
    enabled: True  # Set to True to enable early stopping
    patience: 10  # Number of epochs to wait for improvement
    min_delta: 0.0001  # Minimum change to qualify as improvement
    monitor: 'val_rmse'  # Metric to monitor ('val_loss', 'val_rmse', 'val_mae', 'val_r2')
    mode: 'min'  # 'min' for metrics to minimize (loss, rmse, mae), 'max' for metrics to maximize (r2)
    restore_best_weights: True  # Restore model weights from the epoch with the best value
  parallelize: False
  lookup_hpo: True
  verbose: 1


hpo:
  studies_path: '/mnt/nas/optuna_studies/optuna_viktor.db'
  objectives:
    - metric: 'val_rmse'
      direction: 'minimize'
  trials: 1000
  kfolds: 4
  min_train_date: '2024-04-30'
  val_split: 1
  pruning:
    use_median_pruner: True
    n_startup_trials: 10
    n_warmup_steps: 2
    interval_steps: 1
    disable_pruning: False
  batch_size: [32, 1024]
  epochs: [1, 150]
  n_layers: [1, 4]
  n_cnn_layers: [1, 10]
  n_rnn_layers: [1, 7]
  learning_rate: [0.0001, 0.01]
  attention_heads: [1,64] # if attention is used in hybrid models
  fnn:
    units: [32, 256]
  cnn:
    filters: [16, 128]
    kernel_size: [2, 5]
    increase_filters: False
  rnn:
    units: [16, 100]
    dropout: [0.0, 0.8]
  tft:
    n_heads: [1, 8]
    hidden_dim: [16, 256]
    dropout: [0.01, 0.8]
    n_lstm_layers: [1, 5]  # Same for both encoder and decoder
    static_embedding_dim: [8, 128]  # Separate dimension for static feature embeddings (null = use hidden_dim)
    num_quantiles: [1]
    clipnorm: [0, 10.0]
  fl:
    strategy: 'fedavg'
    personalize: False
    n_rounds: [1,20]
    server_lr: [0.0001, 0.1]
    beta_1: [0,1]
    beta_2: [0,1]
    tau: [0.0001, 0.1]

eval:
  results_path: 'results'
  eval_on_all_test_data: True
  retrain_interval: 0 # in hours - 0 if no retraining is wanted
  t_0: 12
  synth_wind:
    h1: 10
    p_s_model: 'huang'
    v2_method: 'alphaI'
    karman: 0.4
    temp_gradient: 0.00649
    interpol_method: 'polynomial'
    polynom_grad: 3
    noise: 0.0
    annual_degradation: 0.0063
    apply_ageing: True
    hourly_resolution: True
    random_seed: 42
    turbine_dir: "/mnt/nas/synthetic/wind/power_curves"
    turbine_power: 'turbine_power.csv'
    turbine_specs: "turbine_specs.csv"
    turbine_cp: "turbine_cp.csv"
    turbine_names: "turbine_names.csv"
