mtgnn:
  # Input features
  # dir_in_deg mode requires u/v pairs — use the list below instead of speed-only:
  #   icond2_features: ['u_10m', 'v_10m', 'wind_speed_10m', 'wind_speed_38m']
  #   ecmwf_features:  ['u_wind10m', 'v_wind10m', 'wind_speed_10m']
  icond2_features: ['u_10m', 'v_10m', 'wind_speed_10m', 'wind_speed_38m'] # 'wind_speed_38m'
  ecmwf_features:  ['u_wind10m', 'v_wind10m', 'wind_speed_10m']
  icond2_feature_mode: dir_in_deg   # absolute | components | both | dir_in_deg
  ecmwf_feature_mode:  dir_in_deg   # absolute | components | both | dir_in_deg
  measurement_features: ['wind_speed', 'wind_direction']
  target_col: 'wind_speed'
  n_workers: 8
  icond2_run_hours: [6,9,12,15]

  # NWP aggregation
  nwp_nodes: false                          # true → GATv2 over k grid points; false → concat into station.x
  next_n_icond2: 4                          # nearest ICON-D2 grid points per station; HPO varies 1-7
  next_n_ecmwf: 4                           # nearest ECMWF grid points (0 = disabled)
  aggregate_nwp: false                       # true: IDW-mean  false: concat all k points
  # nwp_out_dim: 32                          # GATv2 output dim per station (only used when nwp_nodes=true)
  # nwp_heads: 4                             # GATv2 attention heads (only used when nwp_nodes=true)

  # Time windows
  history_length: 48
  forecast_horizon: 48

  # Architecture
  hidden: 64
  n_layers: 5          # dilations [1,2,4,8,16] → RF=187, covers T_total=96
  K_hop: 2
  beta: 0.05
  emb_dim: 64
  graph_alpha: 3.0
  dropout: 0.2

  # Training
  min_target_stations: 1
  max_target_stations: 10
  max_neighbor_stations: 90
  next_n_neighbors: 90   # spatial kNN subsample (analog to DCRNN); HPO varies 60-120
  topk_graph: 20         # top-k neighbours per row in A (paper Eqs. 4-6); null = dense; HPO varies 5-40
  handle_nans: break
  loss_weights_by_horizon: true
  horizon_decay: 0.90
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  grad_accum: 4
  max_epochs: 200
  patience: 15
  gradient_clip: 5.0

  # Curriculum learning: increase forecast horizon by 1 step every N epochs
  cl_period: 1

  # ---------------------------------------------------------------------------
  # HPO bounds — read by hpo_mtgnn.py
  # ---------------------------------------------------------------------------
  hpo:
    trials: 1000
    studies_path: studies/
    tensorboard_monitoring: true
    pruner: median
    pruner_n_startup_trials: 20
    pruner_n_warmup_steps: 1
    n_folds: 3
    min_train_date: '2024-03-31'
    n_val_stations: 50
    max_epochs_per_trial: 100
    patience_per_trial: 10

    params:
      next_n_icond2:
        type: int
        low: 1
        high: 7

      next_n_ecmwf:
        type: int
        low: 0
        high: 4

      hidden:
        type: int
        low: 32
        high: 128
        step: 4

      n_layers:
        type: int
        low: 4
        high: 8

      K_hop:
        type: int
        low: 1
        high: 3

      beta:
        type: float
        low: 0.01
        high: 0.2

      emb_dim:
        type: int
        low: 16
        high: 128
        step: 4

      graph_alpha:
        type: float
        low: 1.0
        high: 6.0

      dropout:
        type: float
        low: 0.0
        high: 0.4

      lr:
        type: float
        low: 1.0e-5
        high: 1.0e-3
        log: true

      weight_decay:
        type: float
        low: 1.0e-6
        high: 1.0e-3
        log: true

      horizon_decay:
        type: float
        low: 0.5
        high: 0.99

      gradient_clip:
        type: float
        low: 0.5
        high: 10.0

      grad_accum:
        type: int
        low: 1
        high: 64

      next_n_neighbors:
        type: int
        low: 50
        high: 90

      icond2_feature_mode:
        type: categorical
        choices: [absolute, dir_in_deg]

      ecmwf_feature_mode:
        type: categorical
        choices: [absolute, dir_in_deg]

      topk_graph:
        type: int
        low: 5
        high: 40
