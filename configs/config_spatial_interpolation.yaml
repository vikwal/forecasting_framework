interpolation:
  k_neighbors: 8          # number of nearest neighbours used for each prediction
  idw_power: 2.0          # IDW exponent (weight = 1 / dist^power)
  variogram_model: 'gaussian'   # spherical | gaussian | exponential
  n_variogram_lags: 30    # number of lag bins for empirical semivariance
  max_variogram_dist: 1000 # km; null = half of max pairwise dist (~430 km for this network)
  interpolate_uv: true    # also interpolate u/v wind components (requires wind_direction column)
  variogram_segments: 0   # 1=global (one variogram), 0=per-timestamp, N=N equal time blocks
  anisotropy:
    enabled: true        # set to true to use anisotropic distances in the kriging system
    angle: 0            # major axis direction (geographic degrees, clockwise from North)
    ratio: 0.2            # range_minor / range_major  (< 1 = more correlated along major axis)
  rk_features:            # covariates for the OLS trend in Regression Kriging
    - altitude            # static (from wind_parameter.csv)
    - relative_humidity   # dynamic
    #- temperature_2m      # dynamic (from synth_*.csv, per timestamp)
  azimuths: [0, 45, 90, 135]  # directional variogram angles in degrees (geographic: 0=N, 90=E); tolerance fixed at ±22.5°
  #azimuths: [22.5, 67.5, 112.5, 157.5]
  #azimuths: [0, 30, 60, 90, 120, 150]

output:
  path: 'results/geostatistics'
  prefix: 'spatial_interp'   # prepended to all output filenames
