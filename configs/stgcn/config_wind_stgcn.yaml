stgcn:
  # Input features (ICON-D2 ML; NWP is distance-weighted mean per station)
  icond2_features: ['wind_speed_10m']
  measurement_features: ['wind_speed', 'wind_direction']
  target_col: 'wind_speed'
  n_workers: 8
  icond2_run_hours: [6]

  # NWP aggregation
  k_nwp: 4

  # Time windows
  history_length: 48
  forecast_horizon: 48

  # Architecture
  hidden: 64
  n_blocks: 5          # dilations [1,2,4,8,16] → RF = 1 + 2*2*(1+2+4+8+16) = 125 ≥ T_total=96
  emb_dim: 64
  graph_alpha: 3.0
  kernel_size: 3
  dropout: 0.2

  # Training
  min_target_stations: 1
  max_target_stations: 10
  max_neighbor_stations: 60
  handle_nans: break
  loss_weights_by_horizon: true
  horizon_decay: 0.90
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  steps_per_epoch: 200
  grad_accum: 4
  max_epochs: 200
  patience: 15
  gradient_clip: 5.0
