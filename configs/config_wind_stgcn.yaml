gnn:
  station_split_seed: 42       # RNG seed for 80/80 station split (must match TFT pipeline)
  val_fraction: 0.2            # fraction of timestamps held out for early stopping
  hidden: 128                  # hidden dimension (must be divisible by heads)
  heads: 4                     # GATv2 attention heads
  num_layers: 3                # number of GATv2 layers
  dropout: 0.1
  lr: 0.001
  weight_decay: 1.0e-5
  batch_size: 512
  max_epochs: 100
  patience: 15                 # early stopping patience (epochs)
  num_workers: 16

stgnn:
  radius_km: 500              # Kanten nur zu Stationen innerhalb dieses Radius (geodätisch)
  max_neighbors: 8           # optional: max eingehende Kanten pro Node (null = unbegrenzt)
  seq_len: 96                 # total sequence length (past_len + forecast_horizon)
  forecast_horizon: 48        # steps 48–95 are predicted (= future 48 h)
  hidden: 128                 # hidden dimension (must be divisible by heads)
  heads: 4                    # GATv2 attention heads
  num_layers: 3              # number of ST-blocks
  temporal_kernel_size: 5     # Conv1d kernel size along the time axis
  dropout: 0.2
  lr: 3.0e-4
  weight_decay: 1.0e-5
  batch_size: 64              # smaller than GNN due to 96-step sequences
  max_epochs: 100
  patience: 10                # early stopping patience (epochs)
  num_workers: 4

stgnn2:
  # Input features
  icond2_features: ['u_10m', 'v_10m', 'wind_speed_10m', 'wind_speed_38m'] # 'u_10m', 'v_10m'          # ICON-D2 ML features: {quantity}_{height}m
  ecmwf_features: ['u_wind10m', 'v_wind10m', 'wind_speed_10m']  # 'u_wind10m', 'v_wind10m' # ECMWF DB column names (normalised form)
  measurement_features: ['wind_speed', 'wind_direction']          # columns from synth_*.csv (historical input)
  target_col: 'wind_speed'                      # which measurement feature to predict
  n_workers: 16 # parallel data loading workers (passed to DataLoader)

  # Graph topology
  next_n_icond2: 4              # ICON-D2 grid points per station
  next_n_ecmwf: 4              # ECMWF grid points per station
  station_connectivity: delaunay  # "delaunay" | "knn"
  use_altitude_diff: true       # NWP nodes have altitude=0, so diff = station elevation above NWP surface

  # Time windows
  history_length: 48            # past hours with measurements
  forecast_horizon: 48          # hours to predict

  # ICON-D2 run hours to include (all four available: 6, 9, 12, 15)
  icond2_run_hours: [6,9,12,15]

  # Architecture
  temporal_encoding: gru        # "flat" | "gru" | "cnn"
  hidden: 128
  num_layers: 3                 # message-passing layers
  encoder_mlp_layers: 2
  decoder_mlp_layers: 2
  aggregation: mean
  gru_hidden: 64
  gru_layers: 2
  cnn_channels: 64
  cnn_kernel_size: 5
  dropout: 0.3
  update_nwp_nodes: false

  # Training
  min_target_stations: 1
  max_target_stations: 10
  max_neighbor_stations: 60
  neighbor_radius_km: 500      # only include neighbour stations within this radius of any target
  loss_fn: mse
  loss_weights_by_horizon: true
  horizon_decay: 0.95
  lr: 1.0e-4
  weight_decay: 1.0e-3
  scheduler: cosine
  batch_size: 32
  max_epochs: 200
  patience: 10
  gradient_clip: 1.0

dcrnn:
  # Input features — full list; icond2_feature_mode / ecmwf_feature_mode controls which are used
  # absolute: only wind_speed_* | components: only u_*/v_* | both: all features
  icond2_features: ['u_10m', 'v_10m', 'wind_speed_10m', 'wind_speed_38m']
  ecmwf_features:  ['u_wind10m', 'v_wind10m', 'wind_speed_10m']
  icond2_feature_mode: both   # absolute | components | both
  ecmwf_feature_mode:  both   # absolute | components | both
  measurement_features: ['wind_speed', 'wind_direction']
  target_col: 'wind_speed'
  n_workers: 16

  # Graph
  next_n_icond2: 4
  next_n_ecmwf: 4
  station_connectivity: delaunay
  use_altitude_diff: true
  icond2_run_hours: [6, 9, 12, 15]

  # Time windows
  history_length: 48
  forecast_horizon: 48
  temporal_encoding: gru        # sampler output format for DCRNN

  # DCRNN architecture
  hidden: 128
  num_layers: 2
  diffusion_K: 2
  nwp_out_dim: 64    # output dim of NWP attention layer; must be divisible by nwp_heads
  nwp_heads: 4        # GATv2 attention heads for NWP → station
  dropout: 0.3
  teacher_forcing_ratio: 0.1   # starts here, linearly decays to 0

  # Station subgraph sampling
  min_target_stations: 1
  max_target_stations: 10
  max_neighbor_stations: 60
  neighbor_radius_km: 500

  # Training
  loss_fn: mse
  loss_weights_by_horizon: true
  horizon_decay: 0.95
  lr: 3.0e-4
  weight_decay: 1.0e-3
  batch_size: 8
  max_epochs: 200
  patience: 15
  gradient_clip: 1.0

  # ---------------------------------------------------------------------------
  # HPO bounds — read by hpo_dcrnn.py
  # Each param entry has a "type" key:
  #   categorical : choices list
  #   int         : low / high (+ optional step)
  #   float       : low / high (+ optional log: true for log-uniform sampling)
  # All other dcrnn params not listed here keep their fixed values above.
  # ---------------------------------------------------------------------------
  hpo:
    trials: 1000
    studies_path: studies/
    # Cross-validation: expanding-window, same idea as hpo_cl.py
    n_folds: 4
    min_train_date: '2024-04-30'  # end of chunk-0 (always training); folds validate on [2024-07-31 … 2025-08-01]
    n_val_stations: 50            # use first N stations from val_files as HPO val set
    # max training epochs per trial (usually shorter than the final run)
    max_epochs_per_trial: 100
    patience_per_trial: 10

    params:
      # DCGRU hidden dimension (no divisibility constraint)
      hidden:
        type: int
        low: 32
        high: 128

      num_layers:
        type: int
        low: 1
        high: 4

      diffusion_K:
        type: int
        low: 1
        high: 5

      # NWP attention heads — sampled first; nwp_out_dim is then forced to be
      # a multiple of nwp_heads via nwp_out_per_head (see hpo_dcrnn.py)
      nwp_heads:
        type: int
        low: 1
        high: 8

      # Per-head output dimension of the NWP attention layer.
      # nwp_out_dim = nwp_heads * nwp_out_per_head (enforced in hpo_dcrnn.py)
      nwp_out_per_head:
        type: int
        low: 8
        high: 64

      dropout:
        type: float
        low: 0.0
        high: 0.5

      teacher_forcing_ratio:
        type: float
        low: 0.0
        high: 0.3

      lr:
        type: float
        low: 1.0e-5
        high: 1.0e-3
        log: true

      weight_decay:
        type: float
        low: 1.0e-6
        high: 1.0e-3
        log: true

      batch_size:
        type: int
        low: 4
        high: 64

      horizon_decay:
        type: float
        low: 0.80
        high: 1.00

      scheduler:
        type: categorical
        choices: [cosine, plateau, none]

      icond2_feature_mode:
        type: categorical
        choices: [absolute, components, both]

      ecmwf_feature_mode:
        type: categorical
        choices: [absolute, components, both]

cache:
  use_cache: true
  cache_dir: 'data_cache/gnns'

output:
  path: 'results/geostatistics'
  prefix: 'spatial_interp'   # prepended to all output filenames
