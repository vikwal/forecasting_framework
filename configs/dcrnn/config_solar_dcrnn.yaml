dcrnn:
  # ── Features ───────────────────────────────────────────────────────────────
  # Special derived names (computed from raw SL columns before resampling):
  #   ghi_nwp       = aswdir_s + aswdifd_s   (global horizontal irradiance)
  #   dhi_nwp       = aswdifd_s               (diffuse horizontal irradiance)
  #   bhi_nwp       = aswdir_s                (direct beam on horizontal)
  #   wind_speed_nwp = sqrt(u_10m² + v_10m²)
  # All other names are treated as direct column names in the SL parquet.
  icond2_features: ['ghi_nwp', 'dhi_nwp', 'clct', 'alb_rad', 't_2m']
  ecmwf_features: []             # set next_n_ecmwf: 0 to disable entirely
  measurement_features: ['ghi', 'dhi']
  target_col: 'ghi'
  n_workers: 16
  n_ahead_prefetch: 8
  prefetch_workers: 2
  handle_nans: break
  interpolate_history: false

  # ── Graph ───────────────────────────────────────────────────────────────────
  next_n_icond2: 4
  next_n_ecmwf: 0                # ECMWF disabled for solar (no surface radiation fields)
  station_connectivity: delaunay
  use_altitude_diff: true
  use_direction_features: true
  use_distance_features: true
  icond2_run_hours: [6]

  # ── Time windows ────────────────────────────────────────────────────────────
  history_length: 48
  forecast_horizon: 48
  temporal_encoding: gru

  # ── DCRNN architecture ──────────────────────────────────────────────────────
  hidden: 64
  num_layers: 1
  K_hop: 1
  nwp_out_dim: 64
  nwp_heads: 4
  dropout: 0.1
  teacher_forcing_ratio: 0.3

  # ── Station subgraph sampling ───────────────────────────────────────────────
  min_target_stations: 1
  max_target_stations: 10
  next_n_neighbors: 90

  # ── Training ────────────────────────────────────────────────────────────────
  loss_fn: mse
  loss_weights_by_horizon: true
  horizon_decay: 0.85
  lr: 3.0e-4
  weight_decay: 1.0e-3
  batch_size: 64
  max_epochs: 50
  patience: 10
  gradient_clip: 1.0
  scheduler: plateau


cache:
  use_cache: true
  cache_dir: 'data_cache/gnns'

output:
  path: 'results/geostatistics'
  prefix: 'solar_spatial_interp'
