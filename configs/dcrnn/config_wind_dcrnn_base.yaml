dcrnn:
  # Input features
  icond2_features: ['u_10m', 'v_10m', 'wind_speed_10m', 'wind_speed_38m']
  ecmwf_features:  ['u_wind10m', 'v_wind10m', 'wind_speed_10m']
  icond2_feature_mode: absolute   # absolute | components | both
  ecmwf_feature_mode:  absolute   # absolute | components | both
  measurement_features: ['wind_speed', 'wind_direction']
  target_col: 'wind_speed'
  n_workers: 16
  n_ahead_prefetch: 8
  prefetch_workers: 2
  handle_nans: break
  interpolate_history: false
  direction_to_adj: false

  # Graph
  next_n_icond2: 1              # k NWP grid points concatenated into station.x; HPO varies 1-4
  next_n_ecmwf: 1               # ECMWF grid points concatenated into station.x
  station_connectivity: delaunay
  use_altitude_diff: true
  use_direction_features: true
  use_distance_features: true
  icond2_run_hours: [6,9,12,15]

  # Time windows
  history_length: 48
  forecast_horizon: 48
  temporal_encoding: gru

  # DCRNN architecture (nwp_nodes=false: no GATv2 over NWP nodes, k*I2 features in station.x)
  nwp_nodes: false
  hidden: 64
  num_layers: 1
  K_hop: 1
  nwp_out_dim: 64    # unused when nwp_nodes=false
  nwp_heads: 4       # unused when nwp_nodes=false
  dropout: 0.1
  teacher_forcing_ratio: 0.3

  # Station subgraph sampling
  min_target_stations: 1
  max_target_stations: 10
  next_n_neighbors: 90

  # Training
  loss_fn: mse
  loss_weights_by_horizon: true
  horizon_decay: 0.85
  lr: 3.0e-4
  weight_decay: 1.0e-3
  batch_size: 64
  max_epochs: 50
  patience: 10
  gradient_clip: 1.0
  scheduler: plateau

  # ---------------------------------------------------------------------------
  # HPO bounds — read by hpo_dcrnn.py
  # nwp_nodes=false: no GATv2 → nwp_heads and nwp_out_per_head are not applicable.
  # next_n_icond2 controls how many NWP grid points are concatenated into station.x.
  # ---------------------------------------------------------------------------
  hpo:
    trials: 1000
    studies_path: studies/
    tensorboard_monitoring: true
    pruner: median
    pruner_n_startup_trials: 20
    pruner_n_warmup_steps: 1
    n_folds: 3
    min_train_date: '2024-03-31'
    n_val_stations: 50
    max_epochs_per_trial: 100
    patience_per_trial: 10

    params:
      next_n_icond2:
        type: int
        low: 1
        high: 4

      next_n_ecmwf:
        type: int
        low: 0
        high: 4

      hidden:
        type: int
        low: 48
        high: 96

      num_layers:
        type: int
        low: 1
        high: 3

      K_hop:
        type: int
        low: 1
        high: 2

      dropout:
        type: float
        low: 0.0
        high: 0.5

      teacher_forcing_ratio:
        type: float
        low: 0.1
        high: 0.4

      lr:
        type: float
        low: 1.0e-6
        high: 5.0e-4
        log: true

      weight_decay:
        type: float
        low: 1.0e-7
        high: 1.0e-4
        log: true

      batch_size:
        type: int
        low: 4
        high: 64

      horizon_decay:
        type: float
        low: 0.5
        high: 0.87

      next_n_neighbors:
        type: int
        low: 60
        high: 120

      gradient_clip:
        type: float
        low: 0.5
        high: 5.0


cache:
  use_cache: true
  cache_dir: 'data_cache/gnns'

output:
  path: 'results/geostatistics'
  prefix: 'spatial_interp'
